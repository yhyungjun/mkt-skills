<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>셀러 OS — 운영 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-y:scroll}
::-webkit-scrollbar{width:12px;height:12px;-webkit-appearance:none}
::-webkit-scrollbar-track{background:rgba(0,0,0,.06)}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.28);border-radius:6px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.45);background-clip:padding-box}
:root{
  --primary:#4361ee;--primary-light:#eef1ff;--danger:#e63946;--warning:#f4a261;
  --success:#2a9d8f;--bg:#f4f5f7;--card:#fff;--text:#1a1a2e;--text-sec:#6c757d;
  --border:#e2e5ea;--shadow:0 2px 8px rgba(0,0,0,.06);--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;display:flex;min-height:100vh}
a{text-decoration:none;color:inherit}
.sidebar{width:220px;background:#1a1a2e;color:#fff;padding:24px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar .logo{font-size:20px;font-weight:800;padding:0 24px 32px;letter-spacing:-.5px}
.sidebar .logo span{color:var(--primary)}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;color:#a0a4b8;transition:.2s;cursor:pointer}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(255,255,255,.08);color:#fff}
.sidebar nav a svg{width:18px;height:18px;flex-shrink:0}
.main{margin-left:220px;flex:1;min-width:0}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:700;white-space:nowrap}
.toggle-group{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.toggle-group button{padding:6px 16px;font-size:13px;border:none;background:var(--card);cursor:pointer;transition:.2s;color:var(--text-sec)}
.toggle-group button.active{background:var(--primary);color:#fff}
.filter-group{display:flex;gap:6px}
.filter-group button{padding:5px 14px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;transition:.2s;color:var(--text-sec)}
.filter-group button.active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.header-right{display:flex;align-items:center;gap:12px;white-space:nowrap}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:13px;transition:.2s}
.refresh-btn:hover{border-color:var(--primary);color:var(--primary)}
.refresh-btn svg{width:16px;height:16px}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.timestamp{font-size:12px;color:var(--text-sec)}
.content{padding:24px 32px}
.summary-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.summary-cards.col3{grid-template-columns:repeat(3,1fr)}
.s-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.s-card .label{font-size:13px;color:var(--text-sec);margin-bottom:8px}
.s-card .value{font-size:28px;font-weight:800;letter-spacing:-.5px}
.s-card .change{font-size:13px;margin-top:6px;font-weight:600}
.s-card .change.up{color:var(--success)}.s-card .change.down{color:var(--danger)}
.s-card .sub{font-size:12px;color:var(--text-sec);margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card h3{font-size:15px;font-weight:700;margin-bottom:16px}
.full-width{margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);color:var(--text-sec);font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tr.low-margin{background:#fff5f5}
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700}
.badge.safe{background:#e8f5e9;color:#2e7d32}
.badge.warn{background:#fff3e0;color:#e65100}
.badge.danger{background:#ffebee;color:#c62828}
.badge.info{background:var(--primary-light);color:var(--primary)}
.badge.resolved{background:#f5f5f5;color:#999}
.channel-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.channel-tag.naver{background:#e8f5e9;color:#1db177}
.channel-tag.coupang{background:#fff0e6;color:#f05014}
.tooltip-icon{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--border);font-size:10px;cursor:help;margin-left:4px;position:relative;color:var(--text-sec)}
.tooltip-icon:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:10;font-weight:400}
.alerts-section h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.alerts-section h3 svg{width:18px;height:18px;color:var(--danger)}
.alert-card{background:var(--card);border-left:4px solid var(--danger);border-radius:0 var(--radius) var(--radius) 0;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.alert-card.warning{border-left-color:var(--warning)}
.alert-card.info{border-left-color:var(--primary)}
.alert-card.resolved{border-left-color:#ccc;opacity:.6}
.alert-card .alert-type{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--danger);margin-bottom:4px}
.alert-card.warning .alert-type{color:var(--warning)}
.alert-card.info .alert-type{color:var(--primary)}
.alert-card.resolved .alert-type{color:#999}
.alert-card .alert-time{font-size:11px;color:var(--text-sec);margin-bottom:6px}
.alert-card p{font-size:13px;margin-bottom:10px;white-space:normal;word-break:keep-all}
.alert-actions{display:flex;gap:8px}
.alert-actions button{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:.2s}
.alert-actions button:hover{border-color:var(--primary);color:var(--primary)}
.page-view{display:none}.page-view.active{display:block}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .3s}
.progress-bar .fill.green{background:var(--success)}.progress-bar .fill.yellow{background:var(--warning)}.progress-bar .fill.red{background:var(--danger)}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--primary);background:var(--card)}
.timeline-item.done::before{background:var(--primary)}
.timeline-item.pending::before{border-color:var(--warning)}
.timeline-item .tl-date{font-size:12px;color:var(--text-sec);font-weight:600}
.timeline-item .tl-desc{font-size:13px;margin-top:2px}
.timeline-item .tl-amount{font-size:15px;font-weight:700;margin-top:2px}
.tab-group{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-group button{padding:8px 16px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.tab-group button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab-group button .count{background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:13px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text-sec)}
.toggle-switch{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:.2s}
.toggle-switch.on{background:var(--primary)}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on::after{left:22px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;opacity:0;transform:translateY(10px);transition:.3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
.hamburger svg{width:24px;height:24px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
@media(max-width:1200px){.summary-cards{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{transform:translateX(-100%);transition:.3s}.sidebar.open{transform:translateX(0)}.overlay.open{display:block}.main{margin-left:0}.hamburger{display:block}.header{padding:12px 16px}.content{padding:16px}.summary-cards,.summary-cards.col3{grid-template-columns:1fr}.s-card .value{font-size:22px}table{font-size:12px}td,th{padding:8px 6px}.header-left{gap:8px}}
@media(max-width:480px){.header{flex-direction:column;align-items:flex-start}.header-right{width:100%;justify-content:space-between}}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="logo">셀러 <span>OS</span></div>
  <nav id="sideNav">
    <a data-page="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      대시보드
    </a>
    <a data-page="profit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      순이익 분석
    </a>
    <a data-page="inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      재고 관리
    </a>
    <a data-page="cashflow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      자금 흐름
    </a>
    <a data-page="alerts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      알림
    </a>
  </nav>
</aside>
<div class="overlay" id="overlay"></div>

<div class="main">
  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <h1 id="pageTitle">운영 대시보드</h1>
      <div class="toggle-group" id="periodToggle">
        <button class="active" data-period="this">이번 달</button>
        <button data-period="last">지난 달</button>
      </div>
      <div class="filter-group" id="channelFilter">
        <button class="active" data-ch="all">전체</button>
        <button data-ch="naver">네이버</button>
        <button data-ch="coupang">쿠팡</button>
      </div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>데이터 갱신</button>
      <span class="timestamp" id="timestamp"></span>
    </div>
  </header>

  <!-- Dashboard -->
  <div class="content page-view active" id="page-dashboard">
    <div class="summary-cards" id="summaryCards"></div>
    <div class="grid-2">
      <div class="card"><h3>채널별 순이익 비중</h3><div style="max-width:280px;margin:0 auto"><canvas id="donutChart"></canvas></div></div>
      <div class="card"><h3>자금 추이 (주간)</h3><canvas id="cashChart"></canvas></div>
    </div>
    <div class="card full-width"><h3>상품별 순이익 랭킹</h3><div style="overflow-x:auto"><table id="profitTable"></table></div></div>
    <div class="card full-width"><h3>재고 현황</h3><div style="overflow-x:auto"><table id="inventoryTable"></table></div></div>
    <div class="alerts-section"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>AI 위험 알림</h3><div id="dashAlertCards"></div></div>
  </div>

  <!-- Profit Analysis -->
  <div class="content page-view" id="page-profit">
    <div class="summary-cards" id="profitSummaryCards"></div>
    <div class="grid-2">
      <div class="card"><h3>상품별 순이익 비교</h3><canvas id="profitBarChart"></canvas></div>
      <div class="card"><h3>비용 구조 분석 (원가 + 수수료)</h3><canvas id="costPieChart"></canvas></div>
    </div>
    <div class="grid-2">
      <div class="card"><h3>채널별 마진율 비교</h3><canvas id="channelMarginChart"></canvas></div>
      <div class="card"><h3>상품별 수수료율</h3><canvas id="feeRateChart"></canvas></div>
    </div>
    <div class="card full-width"><h3>상품별 상세 순이익 분석</h3><div style="overflow-x:auto"><table id="profitDetailTable"></table></div></div>
  </div>

  <!-- Inventory -->
  <div class="content page-view" id="page-inventory">
    <div class="summary-cards col3" id="inventorySummaryCards"></div>
    <div class="grid-2">
      <div class="card"><h3>소진 예상일 현황</h3><canvas id="daysLeftBarChart"></canvas></div>
      <div class="card"><h3>재고 상태 분포</h3><canvas id="stockStatusChart"></canvas></div>
    </div>
    <div class="card full-width"><h3>재고 상세 현황</h3><div style="overflow-x:auto"><table id="inventoryDetailTable"></table></div></div>
    <div class="card full-width"><h3>발주 권장 목록</h3><div style="overflow-x:auto"><table id="reorderTable"></table></div></div>
  </div>

  <!-- Cash Flow -->
  <div class="content page-view" id="page-cashflow">
    <div class="summary-cards" id="cashSummaryCards"></div>
    <div class="card full-width"><h3>자금 추이 상세 (주간)</h3><canvas id="cashDetailChart" height="100"></canvas></div>
    <div class="grid-2">
      <div class="card"><h3>정산 일정</h3><div class="timeline" id="settlementTimeline"></div></div>
      <div class="card"><h3>수입 / 지출 내역</h3><div style="overflow-x:auto"><table id="cashTransTable"></table></div></div>
    </div>
    <div class="card full-width"><h3>채널별 정산 현황</h3><div style="overflow-x:auto"><table id="settlementTable"></table></div></div>
  </div>

  <!-- Alerts -->
  <div class="content page-view" id="page-alerts">
    <div class="summary-cards col3" id="alertSummaryCards"></div>
    <div class="card full-width">
      <div class="tab-group" id="alertTabs">
        <button class="active" data-filter="all">전체</button>
        <button data-filter="danger">위험 <span class="count" id="dangerCount"></span></button>
        <button data-filter="warning">주의</button>
        <button data-filter="info">정보</button>
        <button data-filter="resolved">처리 완료</button>
      </div>
      <div id="alertFullCards"></div>
    </div>
    <div class="card full-width"><h3>알림 설정</h3><div id="alertSettings"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

let period='this',channel='all',currentPage='dashboard',alertFilter='all';

// ══════════════════════════════════════
// Helpers — 순이익 = 매출 − 원가 − 수수료
// ══════════════════════════════════════
const fmt=n=>'₩'+Math.abs(n).toLocaleString('ko-KR');
const fmtShort=n=>{if(Math.abs(n)>=1e8)return'₩'+(n/1e8).toFixed(1)+'억';if(Math.abs(n)>=1e4)return'₩'+Math.round(n/1e4).toLocaleString('ko-KR')+'만';return fmt(n)};
const pct=n=>(n>0?'▲ ':'▼ ')+Math.abs(n).toFixed(1)+'%';
const profitOf=p=>p.revenue-p.cost-p.fee;
const marginOf=p=>profitOf(p)/p.revenue*100;
const daysLeft=p=>p.daily>0?Math.floor(p.stock/p.daily):999;
function filtered(arr){return channel==='all'?arr:arr.filter(p=>p.ch===channel)}
function destroyChart(k){if(charts[k]){charts[k].destroy();charts[k]=null}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Dashboard
// ══════════════════════════════════════
function renderDashboard(){
  const d=DATA[period],s=d.summary,products=filtered(d.products);
  const totalProfit=products.reduce((a,p)=>a+profitOf(p),0);
  const totalRev=products.reduce((a,p)=>a+p.revenue,0);
  const riskCount=products.filter(p=>daysLeft(p)<=7).length;
  const availFund=s.cash+s.cashSettlement-s.cashExpense;

  document.getElementById('summaryCards').innerHTML=`
    <div class="s-card"><div class="label">이번 달 순이익</div><div class="value">${fmtShort(totalProfit)}</div><div class="change ${s.profitChange>=0?'up':'down'}">${pct(s.profitChange)} 전월 대비</div></div>
    <div class="s-card"><div class="label">이번 달 매출</div><div class="value">${fmtShort(totalRev)}</div><div class="change ${s.revenueChange>=0?'up':'down'}">${pct(s.revenueChange)} 전월 대비</div></div>
    <div class="s-card"><div class="label">재고 위험 SKU</div><div class="value" style="color:${riskCount>0?'var(--danger)':'var(--success)'}">${riskCount}개</div><div class="sub">소진 D-7 이하 기준</div></div>
    <div class="s-card"><div class="label">가용 자금</div><div class="value">${fmtShort(availFund)}</div><div class="sub">현금 ${fmtShort(s.cash)} + 정산예정 ${fmtShort(s.cashSettlement)} − 지출예정 ${fmtShort(s.cashExpense)}</div></div>`;

  // Donut
  const allP=DATA[period].products;let nP=0,cP=0;
  allP.forEach(p=>{if(p.ch==='naver')nP+=profitOf(p);else cP+=profitOf(p)});
  if(channel==='naver')cP=0;if(channel==='coupang')nP=0;
  const dd={labels:['네이버','쿠팡'],datasets:[{data:[nP,cP],backgroundColor:['#1db177','#f05014'],borderWidth:0,hoverOffset:6}]};
  if(charts.donut){charts.donut.data=dd;charts.donut.update()}
  else charts.donut=new Chart(document.getElementById('donutChart'),{type:'doughnut',data:dd,options:{cutout:'65%',plugins:{legend:{position:'bottom',labels:{padding:16,font:{size:12}}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)}}}}});

  // Cash chart
  const cf=DATA[period].cashFlow,actual=cf.actual.map(v=>v!==null?v*1000:null),forecast=cf.forecast.map(v=>v!==null?v*1000:null);
  const pr=cf.labels.map((_,i)=>cf.settlementWeeks.includes(i)?8:0);
  const cd={labels:cf.labels,datasets:[
    {label:'실제 자금',data:actual,borderColor:'#4361ee',backgroundColor:'rgba(67,97,238,.1)',fill:true,tension:.3,pointRadius:0,spanGaps:false},
    {label:'예측',data:forecast,borderColor:'#4361ee',borderDash:[6,4],backgroundColor:'transparent',tension:.3,pointRadius:pr,pointBackgroundColor:cf.labels.map((_,i)=>cf.settlementWeeks.includes(i)?'#f05014':'transparent'),pointBorderColor:cf.labels.map((_,i)=>cf.settlementWeeks.includes(i)?'#f05014':'transparent'),pointStyle:cf.labels.map((_,i)=>cf.settlementWeeks.includes(i)?'triangle':'circle'),spanGaps:true}
  ]};
  if(charts.cash){charts.cash.data=cd;charts.cash.update()}
  else charts.cash=new Chart(document.getElementById('cashChart'),{type:'line',data:cd,options:{responsive:true,interaction:{intersect:false,mode:'index'},plugins:{legend:{labels:{font:{size:12},padding:12}},tooltip:{callbacks:{label:ctx=>{let l=ctx.dataset.label+': '+fmt(ctx.raw);if(ctx.datasetIndex===1&&cf.settlementWeeks.includes(ctx.dataIndex))l+=' (정산 입금 예정)';return l}}}},scales:{y:{ticks:{callback:v=>fmtShort(v)},grid:{color:'rgba(0,0,0,.04)'}},x:{grid:{display:false}}}}});

  // Profit table
  const sorted=[...products].map(p=>({...p,profit:profitOf(p),margin:marginOf(p)})).sort((a,b)=>b.profit-a.profit);
  let h='<thead><tr><th>#</th><th>상품명</th><th>채널</th><th>매출</th><th>원가</th><th>수수료</th><th>순이익</th><th>순이익률</th></tr></thead><tbody>';
  sorted.forEach((p,i)=>{
    const cls=p.margin<20?' class="low-margin"':'';
    const tip=p.ch==='coupang'?'<span class="tooltip-icon" data-tip="쿠팡은 상품별 정산 미제공 → 배송완료 건수로 역산">?</span>':'';
    h+=`<tr${cls}><td>${i+1}</td><td>${p.name}</td><td><span class="channel-tag ${p.ch}">${p.ch==='naver'?'네이버':'쿠팡'}</span>${tip}</td><td>${fmt(p.revenue)}</td><td>${fmt(p.cost)}</td><td>${fmt(p.fee)}</td><td style="font-weight:700;color:${p.profit<0?'var(--danger)':'var(--text)'}">${fmt(p.profit)}</td><td style="color:${p.margin<20?'var(--danger)':p.margin<35?'var(--warning)':'var(--success)'}">${p.margin.toFixed(1)}%</td></tr>`;
  });
  document.getElementById('profitTable').innerHTML=h+'</tbody>';

  // Inventory table
  const inv=[...products].map(p=>({...p,days:daysLeft(p),status:daysLeft(p)<=7?'danger':daysLeft(p)<=14?'warn':'safe'})).sort((a,b)=>a.days-b.days);
  let ih='<thead><tr><th>#</th><th>상품명</th><th>채널</th><th>현재 재고</th><th>일평균 판매</th><th>소진 예상</th><th>상태</th></tr></thead><tbody>';
  inv.forEach((p,i)=>{
    const sl=p.status==='danger'?'위험':p.status==='warn'?'주의':'안전';
    ih+=`<tr><td>${i+1}</td><td>${p.name}</td><td><span class="channel-tag ${p.ch}">${p.ch==='naver'?'네이버':'쿠팡'}</span></td><td>${p.stock}개</td><td>${p.daily}개</td><td style="font-weight:700;color:${p.status==='danger'?'var(--danger)':p.status==='warn'?'var(--warning)':'var(--text)'}">D-${p.days}</td><td><span class="badge ${p.status}">${sl}</span></td></tr>`;
  });
  document.getElementById('inventoryTable').innerHTML=ih+'</tbody>';

  // Alerts
  const alerts=ALERTS_FULL.filter(a=>a.status==='active').slice(0,3);
  document.getElementById('dashAlertCards').innerHTML=alerts.map(a=>`
    <div class="alert-card ${a.type==='warning'?'warning':a.type==='info'?'info':''}">
      <div class="alert-type">${a.label}</div><p>${a.msg}</p>
      <div class="alert-actions"><button onclick="showToast('Slack 전송 완료')">Slack 전송</button><button onclick="showToast('이메일 전송 완료')">이메일 전송</button></div>
    </div>`).join('');
}

function renderProfitPage(){
  const products=filtered(DATA[period].products).map(p=>({...p,profit:profitOf(p),margin:marginOf(p)}));
  const totalProfit=products.reduce((a,p)=>a+p.profit,0);
  const totalRev=products.reduce((a,p)=>a+p.revenue,0);
  const avgMargin=totalRev>0?totalProfit/totalRev*100:0;
  const best=[...products].sort((a,b)=>b.margin-a.margin)[0];
  const worst=[...products].sort((a,b)=>a.margin-b.margin)[0];

  document.getElementById('profitSummaryCards').innerHTML=`
    <div class="s-card"><div class="label">총 순이익</div><div class="value">${fmtShort(totalProfit)}</div><div class="sub">매출 대비 ${avgMargin.toFixed(1)}%</div></div>
    <div class="s-card"><div class="label">평균 순이익률</div><div class="value" style="color:${avgMargin<25?'var(--warning)':'var(--success)'}">${avgMargin.toFixed(1)}%</div><div class="sub">가중 평균</div></div>
    <div class="s-card"><div class="label">최고 마진 상품</div><div class="value" style="font-size:18px">${best?best.name:'-'}</div><div class="sub" style="color:var(--success)">${best?best.margin.toFixed(1)+'%':''}</div></div>
    <div class="s-card"><div class="label">최저 마진 상품</div><div class="value" style="font-size:18px">${worst?worst.name:'-'}</div><div class="sub" style="color:var(--danger)">${worst?worst.margin.toFixed(1)+'%':''}</div></div>`;

  const sorted=[...products].sort((a,b)=>b.profit-a.profit);
  destroyChart('profitBar');
  charts.profitBar=new Chart(document.getElementById('profitBarChart'),{type:'bar',data:{
    labels:sorted.map(p=>p.name.length>8?p.name.slice(0,8)+'…':p.name),
    datasets:[{label:'순이익',data:sorted.map(p=>p.profit),backgroundColor:sorted.map(p=>p.margin<20?'#e63946':p.margin<35?'#f4a261':'#2a9d8f'),borderRadius:6}]
  },options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.raw)+' ('+sorted[ctx.dataIndex].margin.toFixed(1)+'%)'}}},scales:{y:{ticks:{callback:v=>fmtShort(v)},grid:{color:'rgba(0,0,0,.04)'}},x:{grid:{display:false}}}}});

  const totalCost=products.reduce((a,p)=>a+p.cost,0);
  const totalFee=products.reduce((a,p)=>a+p.fee,0);
  destroyChart('costPie');
  charts.costPie=new Chart(document.getElementById('costPieChart'),{type:'doughnut',data:{
    labels:['원가','판매수수료','순이익'],
    datasets:[{data:[totalCost,totalFee,totalProfit],backgroundColor:['#6c757d','#f4a261','#2a9d8f'],borderWidth:0}]
  },options:{cutout:'55%',plugins:{legend:{position:'bottom',labels:{padding:12,font:{size:12}}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.raw)+' ('+(ctx.raw/totalRev*100).toFixed(1)+'%)'}}}}});

  const allP=DATA[period].products;
  const nP=allP.filter(p=>p.ch==='naver'),cP=allP.filter(p=>p.ch==='coupang');
  const nM=nP.reduce((a,p)=>a+profitOf(p),0)/nP.reduce((a,p)=>a+p.revenue,0)*100;
  const cM=cP.reduce((a,p)=>a+profitOf(p),0)/cP.reduce((a,p)=>a+p.revenue,0)*100;
  destroyChart('chMargin');
  charts.chMargin=new Chart(document.getElementById('channelMarginChart'),{type:'bar',data:{
    labels:['네이버','쿠팡'],datasets:[{label:'순이익률',data:[nM,cM],backgroundColor:['#1db177','#f05014'],borderRadius:6}]
  },options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw.toFixed(1)+'%'}}},scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.04)'}},y:{grid:{display:false}}}}});

  // Fee rate per product
  destroyChart('feeRate');
  const fSorted=[...products].sort((a,b)=>(b.fee/b.revenue)-(a.fee/a.revenue));
  charts.feeRate=new Chart(document.getElementById('feeRateChart'),{type:'bar',data:{
    labels:fSorted.map(p=>p.name.length>8?p.name.slice(0,8)+'…':p.name),
    datasets:[{label:'수수료율',data:fSorted.map(p=>(p.fee/p.revenue*100)),backgroundColor:fSorted.map(p=>p.ch==='naver'?'#1db177':'#f05014'),borderRadius:6}]
  },options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw.toFixed(1)+'%'}}},scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.04)'}},y:{grid:{display:false}}}}});

  let h='<thead><tr><th>#</th><th>상품명</th><th>채널</th><th>매출</th><th>원가</th><th>원가율</th><th>수수료</th><th>수수료율</th><th>순이익</th><th>순이익률</th></tr></thead><tbody>';
  const detail=[...products].sort((a,b)=>b.profit-a.profit);
  detail.forEach((p,i)=>{
    const cr=(p.cost/p.revenue*100).toFixed(1),fr=(p.fee/p.revenue*100).toFixed(1);
    const cls=p.margin<20?' class="low-margin"':'';
    const tip=p.ch==='coupang'?'<span class="tooltip-icon" data-tip="쿠팡은 상품별 정산 미제공 → 배송완료 건수로 역산">?</span>':'';
    h+=`<tr${cls}><td>${i+1}</td><td>${p.name}</td><td><span class="channel-tag ${p.ch}">${p.ch==='naver'?'네이버':'쿠팡'}</span>${tip}</td><td>${fmt(p.revenue)}</td><td>${fmt(p.cost)}</td><td>${cr}%</td><td>${fmt(p.fee)}</td><td>${fr}%</td><td style="font-weight:700">${fmt(p.profit)}</td><td style="color:${p.margin<20?'var(--danger)':p.margin<35?'var(--warning)':'var(--success)'};font-weight:700">${p.margin.toFixed(1)}%</td></tr>`;
  });
  document.getElementById('profitDetailTable').innerHTML=h+'</tbody>';
}

    const pctFill=Math.min(100,p.days/30*100);
    const bc=p.status==='danger'?'red':p.status==='warn'?'yellow':'green';
    h+=`<tr><td>${i+1}</td><td>${p.name}</td><td><span class="channel-tag ${p.ch}">${p.ch==='naver'?'네이버':'쿠팡'}</span></td><td>${p.stock}개</td><td>${p.daily}개/일</td><td style="font-weight:700;color:${p.status==='danger'?'var(--danger)':p.status==='warn'?'var(--warning)':'var(--text)'}">D-${p.days}</td><td><span class="badge ${p.status}">${sl}</span></td><td style="min-width:120px"><div class="progress-bar"><div class="fill ${bc}" style="width:${pctFill}%"></div></div></td></tr>`;
  });
  document.getElementById('inventoryDetailTable').innerHTML=h+'</tbody>';

  const reorder=sorted.filter(p=>p.status==='danger'||p.status==='warn');
  let rh='<thead><tr><th>상품명</th><th>채널</th><th>현재 재고</th><th>소진 예상</th><th>권장 발주량</th><th>예상 발주 금액</th><th>액션</th></tr></thead><tbody>';
  if(!reorder.length){rh+='<tr><td colspan="7" style="text-align:center;color:var(--text-sec);padding:24px">발주가 필요한 상품이 없습니다</td></tr>'}
  else reorder.forEach(p=>{
    const qty=p.daily*30,uc=Math.round(p.cost/(p.daily*30)),amt=uc*qty;
    rh+=`<tr><td>${p.name}</td><td><span class="channel-tag ${p.ch}">${p.ch==='naver'?'네이버':'쿠팡'}</span></td><td>${p.stock}개</td><td style="color:var(--danger);font-weight:700">D-${p.days}</td><td>${qty}개 (30일분)</td><td style="font-weight:700">${fmt(amt)}</td><td><button onclick="showToast('${p.name} 발주 요청됨')" style="padding:4px 12px;font-size:12px;border:1px solid var(--primary);border-radius:6px;background:var(--primary-light);color:var(--primary);cursor:pointer">발주 요청</button></td></tr>`;
  });
  document.getElementById('reorderTable').innerHTML=rh+'</tbody>';
}

// ══════════════════════════════════════
// Cash Flow
// ══════════════════════════════════════
function renderCashFlowPage(){
  const s=DATA[period].summary;
  const availFund=s.cash+s.cashSettlement-s.cashExpense;
  const pendingAmt=SETTLEMENTS.filter(x=>x.status==='pending').reduce((a,x)=>a+x.amount,0);

  document.getElementById('cashSummaryCards').innerHTML=`
    <div class="s-card"><div class="label">현재 보유 현금</div><div class="value">${fmtShort(s.cash)}</div><div class="sub">사업용 계좌 기준</div></div>
    <div class="s-card"><div class="label">정산 예정 금액</div><div class="value" style="color:var(--primary)">${fmtShort(pendingAmt)}</div><div class="sub">입금 대기 중</div></div>
    <div class="s-card"><div class="label">지출 예정</div><div class="value" style="color:var(--danger)">${fmtShort(s.cashExpense)}</div><div class="sub">이번 달 남은 지출</div></div>
    <div class="s-card"><div class="label">가용 자금 (예상)</div><div class="value" style="color:${availFund>0?'var(--success)':'var(--danger)'}">${fmtShort(availFund)}</div><div class="sub">현금 + 정산예정 − 지출예정</div></div>`;

  const cf=DATA[period].cashFlow,actual=cf.actual.map(v=>v!==null?v*1000:null),forecast=cf.forecast.map(v=>v!==null?v*1000:null);
  const income=cf.labels.map((_,i)=>cf.settlementWeeks.includes(i)?4700000:null);
  destroyChart('cashDetail');
  charts.cashDetail=new Chart(document.getElementById('cashDetailChart'),{type:'line',data:{
    labels:cf.labels,datasets:[
      {label:'실제 자금',data:actual,borderColor:'#4361ee',backgroundColor:'rgba(67,97,238,.08)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#4361ee',spanGaps:false},
      {label:'예측',data:forecast,borderColor:'#4361ee',borderDash:[6,4],backgroundColor:'rgba(67,97,238,.04)',fill:true,tension:.3,pointRadius:3,pointBackgroundColor:'#4361ee',spanGaps:true},
      {label:'정산 입금',data:income,type:'bar',backgroundColor:'rgba(240,80,20,.2)',borderColor:'#f05014',borderWidth:1,borderRadius:4,barThickness:20}
    ]
  },options:{responsive:true,interaction:{intersect:false,mode:'index'},plugins:{legend:{labels:{font:{size:12},padding:12}},tooltip:{callbacks:{label:ctx=>ctx.raw?ctx.dataset.label+': '+fmt(ctx.raw):''}}},scales:{y:{ticks:{callback:v=>fmtShort(v)},grid:{color:'rgba(0,0,0,.04)'}},x:{grid:{display:false}}}}});

  const sortedS=[...SETTLEMENTS].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('settlementTimeline').innerHTML=sortedS.map(x=>{
    const cls=x.status==='done'?'done':x.status==='pending'?'pending':'';
    const badge=x.status==='done'?'<span class="badge safe">입금 완료</span>':x.status==='pending'?'<span class="badge warn">입금 대기</span>':'<span class="badge info">예정</span>';
    return`<div class="timeline-item ${cls}"><div class="tl-date">${x.date} ${badge}</div><div class="tl-desc">${x.desc}</div><div class="tl-amount" style="color:var(--success)">+${fmt(x.amount)}</div></div>`;
  }).join('');

  let th='<thead><tr><th>날짜</th><th>구분</th><th>내역</th><th>금액</th></tr></thead><tbody>';
  TRANSACTIONS.forEach(t=>{th+=`<tr><td>${t.date}</td><td><span class="badge ${t.type==='수입'?'safe':'danger'}">${t.type}</span></td><td>${t.desc}</td><td style="font-weight:700;color:${t.amount>0?'var(--success)':'var(--danger)'}">${t.amount>0?'+':''}${fmt(t.amount)}</td></tr>`});
  document.getElementById('cashTransTable').innerHTML=th+'</tbody>';

  let sh='<thead><tr><th>채널</th><th>정산 주기</th><th>최근 정산일</th><th>최근 정산액</th><th>다음 정산 예정</th><th>예상 금액</th><th>상태</th></tr></thead><tbody>';
  sh+=`<tr><td><span class="channel-tag naver">네이버</span></td><td>월 2회 (5일/20일)</td><td>2025-05-20</td><td>${fmt(3600000)}</td><td>2025-06-05</td><td style="font-weight:700">${fmt(4200000)}</td><td><span class="badge warn">D-3</span></td></tr>`;
  sh+=`<tr><td><span class="channel-tag coupang">쿠팡</span></td><td>월 1회 (12일)</td><td>2025-05-15</td><td>${fmt(4100000)}</td><td>2025-06-12</td><td style="font-weight:700">${fmt(4700000)}</td><td><span class="badge info">D-10</span></td></tr>`;
  document.getElementById('settlementTable').innerHTML=sh+'</tbody>';
}

// ══════════════════════════════════════
// Alerts
// ══════════════════════════════════════
function renderAlertsPage(){
  const active=ALERTS_FULL.filter(a=>a.status==='active');
  const dangerN=active.filter(a=>a.type==='danger').length;
  const resolved=ALERTS_FULL.filter(a=>a.status==='resolved').length;

  document.getElementById('alertSummaryCards').innerHTML=`
    <div class="s-card"><div class="label">활성 알림</div><div class="value" style="color:var(--danger)">${active.length}건</div><div class="sub">위험 ${dangerN} / 주의 ${active.filter(a=>a.type==='warning').length}</div></div>
    <div class="s-card"><div class="label">이번 주 신규</div><div class="value">${active.length}건</div><div class="sub">최근 7일 기준</div></div>
    <div class="s-card"><div class="label">처리 완료</div><div class="value" style="color:var(--success)">${resolved}건</div><div class="sub">이번 달 누적</div></div>`;
  document.getElementById('dangerCount').textContent=dangerN;

  let list=ALERTS_FULL;
  if(alertFilter==='danger')list=ALERTS_FULL.filter(a=>a.type==='danger'&&a.status==='active');
  else if(alertFilter==='warning')list=ALERTS_FULL.filter(a=>a.type==='warning'&&a.status==='active');
  else if(alertFilter==='info')list=ALERTS_FULL.filter(a=>a.type==='info'&&a.status==='active');
  else if(alertFilter==='resolved')list=ALERTS_FULL.filter(a=>a.status==='resolved');

  document.getElementById('alertFullCards').innerHTML=list.length===0
    ?'<p style="text-align:center;color:var(--text-sec);padding:32px">해당 알림이 없습니다</p>'
    :list.map(a=>{
    const cls=a.status==='resolved'?'resolved':a.type==='warning'?'warning':a.type==='info'?'info':'';
    return`<div class="alert-card ${cls}"><div class="alert-type">${a.label} ${a.status==='resolved'?'(처리 완료)':''}</div><div class="alert-time">${a.time}</div><p>${a.msg}</p>${a.status==='active'?`<div class="alert-actions"><button onclick="showToast('Slack 전송 완료')">Slack 전송</button><button onclick="showToast('이메일 전송 완료')">이메일 전송</button><button onclick="showToast('처리 완료')">완료 처리</button></div>`:''}</div>`;
  }).join('');

  const settings=[
    {label:'재고 위험 알림',desc:'소진 예상 D-7 이하 시 알림',on:true},
    {label:'자금 부족 예상 알림',desc:'현금 부족 예상 시 알림',on:true},
    {label:'마진 하락 알림',desc:'순이익률 전월 대비 3%p 이상 하락 시',on:true},
    {label:'정산 입금 알림',desc:'정산 입금 예정일 D-3 알림',on:false},
    {label:'Slack 자동 전송',desc:'위험 알림 발생 시 Slack 자동 전송',on:false},
    {label:'이메일 일일 리포트',desc:'매일 오전 8시 요약 리포트 발송',on:true}
  ];
  document.getElementById('alertSettings').innerHTML=settings.map(s=>
    `<div class="setting-row"><div><div class="setting-label">${s.label}</div><div class="setting-desc">${s.desc}</div></div><div class="toggle-switch ${s.on?'on':''}" onclick="this.classList.toggle('on');showToast('설정이 변경되었습니다')"></div></div>`
  ).join('');
}

// ══════════════════════════════════════
// Navigation & Events
// ══════════════════════════════════════
const PAGE_TITLES={dashboard:'운영 대시보드',profit:'순이익 분석',inventory:'재고 관리',cashflow:'자금 흐름',alerts:'알림'};

function navigateTo(page){
  currentPage=page;
  document.querySelectorAll('.page-view').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('#sideNav a').forEach(a=>a.classList.toggle('active',a.dataset.page===page));
  document.getElementById('pageTitle').textContent=PAGE_TITLES[page];
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  renderCurrentPage();
}

function renderCurrentPage(){
  switch(currentPage){
    case'dashboard':renderDashboard();break;
    case'profit':renderProfitPage();break;
    case'inventory':renderInventoryPage();break;
    case'cashflow':renderCashFlowPage();break;
    case'alerts':renderAlertsPage();break;
  }
}

document.getElementById('sideNav').addEventListener('click',e=>{const l=e.target.closest('a');if(!l)return;e.preventDefault();navigateTo(l.dataset.page)});
document.getElementById('periodToggle').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;period=b.dataset.period;document.querySelectorAll('#periodToggle button').forEach(x=>x.classList.toggle('active',x===b));renderCurrentPage()});
document.getElementById('channelFilter').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;channel=b.dataset.ch;document.querySelectorAll('#channelFilter button').forEach(x=>x.classList.toggle('active',x===b));renderCurrentPage()});
document.getElementById('refreshBtn').addEventListener('click',function(){this.classList.add('loading');setTimeout(()=>{this.classList.remove('loading');document.getElementById('timestamp').textContent='방금 업데이트됨 · '+new Date().toLocaleTimeString('ko-KR');showToast('데이터가 갱신되었습니다')},1000)});
document.getElementById('hamburger').addEventListener('click',()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('open')});
document.getElementById('overlay').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open')});
document.getElementById('alertTabs').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;alertFilter=b.dataset.filter;document.querySelectorAll('#alertTabs button').forEach(x=>x.classList.toggle('active',x===b));renderAlertsPage()});

document.getElementById('timestamp').textContent=new Date().toLocaleTimeString('ko-KR')+' 기준';
renderDashboard();
</script>
</body>
</html>
